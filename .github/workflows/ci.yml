name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node: [20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - name: Install (with retry to mitigate flaky npm "Exit handler never called")
              run: npm ci --fetch-retries 5 --fetch-retry-mintimeout 20000
            - run: npm run typecheck
            - run: npm test
            - run: npm run build
